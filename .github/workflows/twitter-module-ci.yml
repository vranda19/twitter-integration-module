name: Twitter Module CI

# WHY THESE TRIGGERS: run on every PR targeting main (catch regressions
# before merge) and on every push to main (catch anything that slipped
# through, e.g. a direct push or a merge commit). Scoped to changes
# under this module's path plus the workflow file itself, so this
# module's CI doesn't run — and doesn't block merges — on unrelated
# changes elsewhere in the monorepo (LinkedIn, Meta, AI Writer, etc.).
on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/twitter-module-ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    # WHY DUMMY ENV VARS IN CI: Settings() validates required fields at
    # import time (see app/config/settings.py). CI never talks to real
    # Twitter/Supabase/Redis — tests/conftest.py mocks all of that — but
    # the values still need to be PRESENT and correctly SHAPED (e.g. the
    # Supabase key must look like a JWT) for the app to import at all.
    env:
      TWITTER_CLIENT_ID: ci_test_client_id
      TWITTER_CLIENT_SECRET: ci_test_client_secret
      TWITTER_REDIRECT_URI: http://localhost:8000/twitter/callback
      TWITTER_API_KEY: ci_test_api_key
      TWITTER_API_KEY_SECRET: ci_test_api_key_secret
      TWITTER_BEARER_TOKEN: ci_test_bearer_token
      TOKEN_ENCRYPTION_KEY: 3spp8TdJAxe7c7d4v1Aq-lc80fCziLhXl1mS8rkBPFw=
      SUPABASE_URL: https://ci-test-project.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.ci_fake_signature
      SUPABASE_JWT_SECRET: ci_test_jwt_secret_at_least_32_characters_long
      UPSTASH_REDIS_REST_URL: https://ci-test-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci_test_redis_token

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true # non-blocking initially; tighten once the module stabilizes

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt
        continue-on-error: true # surfaces findings without blocking merges; review manually
